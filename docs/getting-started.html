  <h1>Getting Started</h1>

  <h2>Requirements</h2>
  <ul>
    <li>Node.js</li>
    <li>pnpm (via corepack)</li>
  </ul>

  <pre><code>corepack enable
corepack pnpm install
pnpm dev</code></pre>

  <h2>Local URLs</h2>
  <ul>
    <li>API: http://localhost:3000</li>
    <li>Web: http://localhost:5173</li>
  </ul>
